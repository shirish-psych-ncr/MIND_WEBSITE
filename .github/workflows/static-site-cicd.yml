name: Ultra-Robust Static Site CI/CD Fortress

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  pre-flight:
    name: Pre-Flight Checks
    runs-on: ubuntu-latest
    outputs:
      file-count: ${{ steps.count.outputs.count }}
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Count HTML files
        id: count
        run: |
          COUNT=$(find . -name "*.html" -type f | wc -l)
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "Found $COUNT HTML files"
          
      - name: Verify index.html exists
        run: |
          if [ ! -f "./index.html" ]; then
            echo "::error::index.html not found!"
            exit 1
          fi

      - name: Validate Git Repository State
        run: |
          git status
          git log --oneline -5

  ai-sanitizer:
    name: AI Laziness & Visual Trap Sanitizer
    runs-on: ubuntu-latest
    needs: pre-flight
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Detect AI Placeholders & Truncation
        run: |
          echo "### AI Placeholder Scan" >> $GITHUB_STEP_SUMMARY
          if grep -riE "TODO|FIXME|placeholder|insert code|write code|code goes here|rest of the code|logic here|\.\.\.|---" --include=*.{html,css,js,xml} . 2>/dev/null; then
            echo "- CRITICAL FAILURE: The AI left unfinished structural placeholders or truncated code." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "- Codebase is free of lazy placeholders." >> $GITHUB_STEP_SUMMARY

      - name: CSS Contrast & Architecture Enforcement
        run: |
          echo "### CSS Visual & Structural Audit" >> $GITHUB_STEP_SUMMARY
          python3 << 'PYEOF'
import glob, sys

failed = False
errors = []

for f in glob.glob('**/*.css', recursive=True):
    try:
        content = open(f, 'r', encoding='utf-8').read().lower().replace(' ', '').replace('\n', '')
        
        light_text = ['color:#fff', 'color:#ffffff', 'color:white', 'color:#f0f0f0', 'color:#eee']
        light_bg = ['background-color:#fff', 'background-color:#ffffff', 'background:white', 'background:#fff', 'background:#f0f0f0', 'background:#eee']
        
        has_light_text = any(t in content for t in light_text)
        has_light_bg = any(b in content for b in light_bg)
        
        if has_light_text and has_light_bg:
            errors.append(f'Visual Trap: Light text on light background in {f}')
            failed = True
            
        important_count = content.count('!important')
        if important_count > 5:
            errors.append(f'Architecture Violation: Found {important_count} uses of !important in {f}')
            failed = True
    except Exception as e:
        errors.append(f'Error reading {f}: {e}')

for error in errors:
    print(f'::error::{error}')
    
if failed:
    sys.exit(1)
PYEOF
          echo "- CSS architecture passes visual and structural checks." >> $GITHUB_STEP_SUMMARY

      - name: Strict RSS / XML Compilation Check
        run: |
          echo "### RSS/XML Structural Integrity" >> $GITHUB_STEP_SUMMARY
          python3 << 'PYEOF'
import glob, xml.etree.ElementTree as ET, sys

failed = False
xml_files = glob.glob('**/*.xml', recursive=True)

if not xml_files:
    print("No XML files found, skipping validation")
else:
    for f in xml_files:
        try:
            ET.parse(f)
        except Exception as e:
            print(f'::error file={f}::XML Parse Error: {e}')
            failed = True

if failed:
    sys.exit(1)
PYEOF
          echo "- All XML/RSS feeds are structurally sound." >> $GITHUB_STEP_SUMMARY

      - name: JavaScript Syntax Validation
        run: |
          echo "### JavaScript Syntax Check" >> $GITHUB_STEP_SUMMARY
          python3 << 'PYEOF'
import glob, sys

failed = False
js_files = glob.glob('**/*.js', recursive=True)

for f in js_files:
    try:
        with open(f, 'r', encoding='utf-8') as file:
            content = file.read()
            if content.count('{') != content.count('}'):
                print(f'::error file={f}::Mismatched braces')
                failed = True
            if content.count('(') != content.count(')'):
                print(f'::error file={f}::Mismatched parentheses')
                failed = True
            if content.count('[') != content.count(']'):
                print(f'::error file={f}::Mismatched brackets')
                failed = True
    except Exception as e:
        print(f'::error file={f}::Error reading file: {e}')
        failed = True

if failed:
    sys.exit(1)
PYEOF
          echo "- JavaScript syntax validation passed." >> $GITHUB_STEP_SUMMARY

  accessibility-seo:
    name: Accessibility & SEO Auditor
    runs-on: ubuntu-latest
    needs: ai-sanitizer
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Accessibility Audit
        run: |
          echo "### Accessibility Compliance Check" >> $GITHUB_STEP_SUMMARY
          python3 << 'PYEOF'
import glob, sys
from html.parser import HTMLParser

failed = False
errors = []

class AccessibilityChecker(HTMLParser):
    def __init__(self):
        super().__init__()
        self.has_main = False
        self.images_without_alt = []
        
    def handle_starttag(self, tag, attrs):
        attrs_dict = dict(attrs)
        if tag == 'main':
            self.has_main = True
        if tag == 'img' and 'alt' not in attrs_dict:
            self.images_without_alt.append(self.getpos())

html_files = glob.glob('**/*.html', recursive=True)
for f in html_files:
    try:
        with open(f, 'r', encoding='utf-8') as file:
            content = file.read()
            parser = AccessibilityChecker()
            parser.feed(content)
            
            if not parser.has_main and 'component-' not in f:
                errors.append(f'Missing <main> landmark in {f}')
                failed = True
                
            if parser.images_without_alt:
                errors.append(f'Images without alt text in {f}: {len(parser.images_without_alt)}')
                failed = True
    except Exception as e:
        errors.append(f'Error parsing {f}: {e}')
        failed = True

for error in errors[:10]:
    print(f'::error::{error}')
    
if failed:
    print(f'Total errors: {len(errors)}')
    sys.exit(1)
PYEOF
          echo "- Accessibility audit passed." >> $GITHUB_STEP_SUMMARY

      - name: SEO Schema Validation
        run: |
          echo "### SEO Structured Data Check" >> $GITHUB_STEP_SUMMARY
          python3 << 'PYEOF'
import glob, json, re

schema_types_found = set()
files_with_schema = 0
total_files = 0

html_files = glob.glob('**/*.html', recursive=True)
for f in html_files:
    total_files += 1
    try:
        with open(f, 'r', encoding='utf-8') as file:
            content = file.read()
            matches = re.findall(r'<script[^>]*type=["\']application/ld\+json["\'][^>]*>(.*?)</script>', content, re.DOTALL)
            for match in matches:
                try:
                    data = json.loads(match.strip())
                    if isinstance(data, dict):
                        schema_type = data.get('@type', '')
                        if schema_type:
                            schema_types_found.add(schema_type)
                            files_with_schema += 1
                            break
                except json.JSONDecodeError:
                    pass
    except Exception as e:
        pass

print(f'Schema types found: {", ".join(sorted(schema_types_found))}')
print(f'Files with structured data: {files_with_schema}/{total_files}')
PYEOF
          echo "- SEO structured data validation completed." >> $GITHUB_STEP_SUMMARY

  deep-inspector:
    name: W3C, Metadata & Asset Inspector
    runs-on: ubuntu-latest
    needs: accessibility-seo
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install HTML Validation Tools
        run: npm install -g htmlhint

      - name: HTML Structure Validation
        run: |
          echo "### HTML Structure Check" >> $GITHUB_STEP_SUMMARY
          htmlhint . --ignore "node_modules/**" || true
          echo "- HTML structure validation completed." >> $GITHUB_STEP_SUMMARY

      - name: Local Asset Verification
        run: |
          echo "### Local Asset Check" >> $GITHUB_STEP_SUMMARY
          python3 << 'PYEOF'
import glob, re, os

broken_links = []
html_files = glob.glob('**/*.html', recursive=True)

for f in html_files:
    try:
        with open(f, 'r', encoding='utf-8') as file:
            content = file.read()
            base_dir = os.path.dirname(f)
            
            patterns = [
                r'src=["\']([^http][^"\']+)["\']',
                r'href=["\']([^http#][^"\']+)["\']',
            ]
            
            for pattern in patterns:
                matches = re.findall(pattern, content)
                for match in matches:
                    if match and not match.startswith('data:') and not match.startswith('#'):
                        ref_path = match.split('?')[0].split('#')[0].strip()
                        full_path = os.path.normpath(os.path.join(base_dir, ref_path))
                        
                        if not os.path.exists(full_path):
                            broken_links.append(f'{f}: {match}')
    except Exception as e:
        pass

if broken_links:
    for link in broken_links[:20]:
        print(f'::warning::Potentially broken reference: {link}')
    print(f'Total potential broken references: {len(broken_links)}')
else:
    print('No broken local references found')
PYEOF
          echo "- Local asset verification completed." >> $GITHUB_STEP_SUMMARY

  performance-check:
    name: Performance & Best Practices
    runs-on: ubuntu-latest
    needs: deep-inspector
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Performance Audit
        run: |
          echo "### Performance Best Practices" >> $GITHUB_STEP_SUMMARY
          python3 << 'PYEOF'
import glob, re

issues = []

js_files = glob.glob('**/*.js', recursive=True)
for f in js_files:
    try:
        with open(f, 'r', encoding='utf-8') as file:
            content = file.read()
            if 'addEventListener' in content and 'scroll' in content:
                if 'passive' not in content:
                    issues.append(f'{f}: Scroll listener may benefit from passive option')
    except:
        pass

html_files = glob.glob('**/*.html', recursive=True)
for f in html_files:
    try:
        with open(f, 'r', encoding='utf-8') as file:
            content = file.read()
            style_matches = re.findall(r'style="([^"]+)"', content)
            for style in style_matches:
                if len(style) > 200:
                    issues.append(f'{f}: Large inline style detected')
                    break
    except:
        pass

if issues:
    for issue in issues[:10]:
        print(f'::notice::{issue}')
    print(f'Total recommendations: {len(issues)}')
else:
    print('No performance recommendations')
PYEOF
          echo "- Performance audit completed." >> $GITHUB_STEP_SUMMARY

  deploy:
    name: Production Deployment
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [ai-sanitizer, accessibility-seo, deep-inspector, performance-check]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Validate Build Output
        run: |
          echo "### Validating deployment readiness"
          if [ ! -f "./index.html" ]; then
            echo "::error::index.html not found!"
            exit 1
          fi
          HTML_COUNT=$(find . -name "*.html" -type f | wc -l)
          echo "Ready to deploy $HTML_COUNT HTML files"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Post-Deployment Summary
        run: |
          echo "### Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "- Site URL: ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
          echo "- Deployed at: $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
