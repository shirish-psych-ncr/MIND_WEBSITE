# =============================================================================
# Ultra-Robust Static Site CI/CD Fortress
# Version 2.1 (Parallel Execution & No Cascading Skips)
# =============================================================================

name: Ultra-Robust Static Site CI/CD Fortress

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  PYTHON_VERSION: "3.12"
  CI: true
  FORCE_COLOR: "3"

defaults:
  run:
    shell: bash

################################################################################
# JOBS
################################################################################

jobs:
  ################################################################################
  # PRE-FLIGHT
  ################################################################################

  pre-flight:
    name: 🚀 Pre-Flight Repository Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      html-count: ${{ steps.stats.outputs.html-count }}
      css-count: ${{ steps.stats.outputs.css-count }}
      js-count: ${{ steps.stats.outputs.js-count }}
      xml-count: ${{ steps.stats.outputs.xml-count }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Repository Information
        run: |
          echo "Repository: $GITHUB_REPOSITORY"
          echo "Branch:     $GITHUB_REF_NAME"
          echo "Commit:     $GITHUB_SHA"
          git status
          git log --graph --decorate --oneline -10

      - name: Verify Repository Layout
        run: |
          REQUIRED=(index.html)
          FAILED=0
          for file in "${REQUIRED[@]}"; do
              if [[ ! -f "$file" ]]; then
                  echo "::error::$file not found"
                  FAILED=1
              fi
          done
          if [[ $FAILED -ne 0 ]]; then exit 1; fi

      - id: stats
        name: Repository Statistics
        run: |
          echo "html-count=$(find . -type f -name '*.html' | wc -l)" >> "$GITHUB_OUTPUT"
          echo "css-count=$(find . -type f -name '*.css' | wc -l)" >> "$GITHUB_OUTPUT"
          echo "js-count=$(find . -type f -name '*.js' | wc -l)" >> "$GITHUB_OUTPUT"
          echo "xml-count=$(find . -type f -name '*.xml' | wc -l)" >> "$GITHUB_OUTPUT"

      - name: Repository Sanity Checks
        run: |
          echo "Checking for merge conflicts..."
          if grep -R -n -E "<<<<<<<|=======|>>>>>>>" . --exclude-dir=.git; then
              echo "::error::Merge conflict markers detected."
              exit 1
          fi

      - name: Verify UTF-8 Encoding
        run: |
          python3 <<'PYTHON'
          import pathlib, sys
          extensions = {".html", ".css", ".js", ".xml", ".json", ".txt", ".md"}
          failed = False
          for path in pathlib.Path(".").rglob("*"):
              if not path.is_file() or path.suffix.lower() not in extensions: continue
              try: path.read_text(encoding="utf-8")
              except UnicodeDecodeError:
                  print(f"::error file={path}::Not UTF-8 encoded")
                  failed = True
          if failed: sys.exit(1)
          print("UTF-8 validation completed.")
          PYTHON

      - name: Pre-flight Summary
        run: |
          {
            echo "## ✅ Pre-flight Complete"
            echo "| Type | Count |"
            echo "|------|------:|"
            echo "| HTML | ${{ steps.stats.outputs.html-count }} |"
            echo "| CSS | ${{ steps.stats.outputs.css-count }} |"
            echo "| JavaScript | ${{ steps.stats.outputs.js-count }} |"
            echo "| XML | ${{ steps.stats.outputs.xml-count }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  ################################################################################
  # AI SANITIZER (Runs in Parallel)
  ################################################################################

  ai-sanitizer:
    name: 🤖 AI Sanitizer & Static Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Validation Tools
        run: |
          npm install --global \
            htmlhint html-validate stylelint stylelint-config-standard \
            eslint prettier

      - name: AI Placeholder Detection
        run: |
          python3 <<'PYTHON'
          import pathlib, re, sys
          patterns = [r"\bTODO\b", r"\bFIXME\b", r"\bXXX\b", r"placeholder", r"insert code", r"coming soon", r"code goes here", r"rest of the code", r"logic here", r"your code here", r"lorem ipsum", r"dummy text", r"sample text", r"replace this", r"implement me", r"to be implemented", r"not implemented", r"tbd"]
          regex = re.compile("|".join(patterns), re.IGNORECASE)
          extensions = {".html", ".css", ".js", ".json", ".xml", ".svg"}
          failed = False

          # Directories and files to skip (templates, node_modules)
          skip_dirs = {'node_modules', '_templates'}

          for path in pathlib.Path(".").rglob("*"):
              # Skip node_modules and template directories
              if any(skip_dir in path.parts for skip_dir in skip_dirs):
                  continue
              if not path.is_file() or path.suffix.lower() not in extensions: continue
              try: text = path.read_text(encoding="utf-8", errors="ignore")
              except Exception: continue
              for line_no, line in enumerate(text.splitlines(), start=1):
                  if regex.search(line):
                      print(f"::error file={path},line={line_no}::Potential AI placeholder -> {line.strip()[:150]}")
                      failed = True
          if failed: sys.exit(1)
          print("No placeholder patterns detected.")
          PYTHON

      - name: HTML Validation
        run: html-validate "**/*.html"

      - name: HTMLHint
        continue-on-error: true
        run: htmlhint . --ignore node_modules/**

      - name: CSS Validation
        continue-on-error: true
        run: |
          echo '{"extends": "stylelint-config-standard"}' > .stylelintrc.json
          stylelint "**/*.css"

      - name: JavaScript Syntax
        run: |
          python3 <<'PYTHON'
          import pathlib, subprocess, sys
          failed = False
          for js in pathlib.Path(".").rglob("*.js"):
              result = subprocess.run(["node", "--check", str(js)], capture_output=True, text=True)
              if result.returncode != 0:
                  failed = True
                  print(f"::error file={js}::{result.stderr}")
          if failed: sys.exit(1)
          print("JavaScript syntax valid.")
          PYTHON

      - name: XML Validation
        run: |
          python3 <<'PYTHON'
          import pathlib, xml.etree.ElementTree as ET, sys
          failed = False
          for xml in pathlib.Path(".").rglob("*.xml"):
              try: ET.parse(xml)
              except Exception as e:
                  failed = True
                  print(f"::error file={xml}::{e}")
          if failed: sys.exit(1)
          print("XML validation completed.")
          PYTHON

      - name: HTML Link Processor
        uses: shravanngoswamii/html-link-action@v1.0.0
        with:
          site-dir: .
          external-only: true
          external-target-blank: true
          noopener: true
          noreferrer: true
          strip-tracking-params: true
          check-links: true
          fail-on-broken: true
          timeout: 10000
          concurrency: 40

      - name: Hyperlink Link Checker
        uses: untitaker/hyperlink@0.1.31
        with:
          args: .

      - name: Sanitizer Summary
        run: |
          {
            echo "## 🤖 AI Sanitizer"
            echo "✔ Placeholder detection"
            echo "✔ HTML/CSS/JS/XML validation"
            echo "✔ External link processing"
            echo "✔ Broken link checking"
          } >> "$GITHUB_STEP_SUMMARY"

  ################################################################################
  # ACCESSIBILITY & SEO AUDITOR (Runs in Parallel)
  ################################################################################

  accessibility-seo:
    name: ♿ Accessibility • SEO • Structured Data
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: HTML Accessibility Inspection
        run: |
          python3 <<'PYTHON'
          from html.parser import HTMLParser
          from pathlib import Path
          import sys
          failed = False

          # Files that are components/templates, not full pages
          component_files = {'nav-panel.html', 'header.html', 'footer.html', 'library-stack.html'}
          component_dirs = {'assets/components', '_templates', 'node_modules'}

          class Inspector(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.has_main, self.has_title, self.images, self.lang, self.viewport, self.h1 = False, False, [], False, False, 0
              def handle_starttag(self, tag, attrs):
                  attrs = dict(attrs)
                  if tag == "html": self.lang = "lang" in attrs
                  if tag == "main": self.has_main = True
                  if tag == "title": self.has_title = True
                  if tag == "img" and not attrs.get("alt"): self.images.append(True)
                  if tag == "meta" and attrs.get("name") == "viewport": self.viewport = True
                  if tag == "h1": self.h1 += 1
          for html in Path(".").rglob("*.html"):
              # Skip component files and node_modules
              if html.name in component_files or any(d in str(html) for d in component_dirs):
                  continue
              parser = Inspector()
              try: parser.feed(html.read_text(encoding="utf-8", errors="ignore"))
              except Exception as e:
                  print(f"::error file={html}::{e}")
                  failed = True
                  continue
              if not parser.lang: print(f"::error file={html}::<html> missing lang attribute"); failed = True
              if not parser.viewport: print(f"::error file={html}::Missing viewport meta"); failed = True
              if not parser.has_main: print(f"::warning file={html}::No <main> landmark")
              if parser.h1 == 0: print(f"::warning file={html}::Missing H1")
              if parser.h1 > 1: print(f"::warning file={html}::Multiple H1 elements")
              if parser.images: print(f"::error file={html}::{len(parser.images)} image(s) missing alt text"); failed = True
          if failed: sys.exit(1)
          print("Accessibility inspection complete.")
          PYTHON

      - name: Schema.org Validation
        run: |
          python3 <<'PYTHON'
          import json, pathlib, re, sys
          schema_types = set()
          invalid = False
          pattern = re.compile(r'<script[^>]*application/ld\+json[^>]*>(.*?)</script>', re.DOTALL|re.IGNORECASE)
          for html in pathlib.Path(".").rglob("*.html"):
              text = html.read_text(encoding="utf-8", errors="ignore")
              for block in pattern.findall(text):
                  try:
                      data = json.loads(block.strip())
                      if isinstance(data, dict):
                          if "@type" in data: schema_types.add(data["@type"])
                          if "@context" not in data: print(f"::warning file={html}::Missing @context")
                  except Exception:
                      print(f"::error file={html}::Invalid JSON-LD")
                      invalid = True
          if invalid: sys.exit(1)
          print("Schema Types:", ", ".join(sorted(schema_types)))
          PYTHON

      - name: Metadata Audit
        run: |
          python3 <<'PYTHON'
          from pathlib import Path
          import re
          title_re = re.compile(r"<title>(.*?)</title>", re.I|re.S)
          meta_re = re.compile(r'<meta[^>]+name=["\']description["\'][^>]+content=["\'](.*?)["\']', re.I|re.S)
          for html in Path(".").rglob("*.html"):
              text = html.read_text(encoding="utf-8", errors="ignore")
              title = title_re.search(text)
              meta = meta_re.search(text)
              if not title: print(f"::warning file={html}::Missing <title>")
              elif len(title.group(1).strip()) < 15: print(f"::notice file={html}::Very short title")
              if not meta: print(f"::warning file={html}::Missing meta description")
              elif len(meta.group(1).strip()) < 70: print(f"::notice file={html}::Very short description")
          PYTHON

      - name: WCAG Color Contrast
        uses: comfort-mode-toolkit/color-contrast-linter-action@v1.0.0

      - name: AI Search / AEO Audit
        uses: Canonry/aeo-audit-action@v4.1.1
        with:
          mode: static
          target: .
          base-url: https://shirish-psych-ncr.github.io/MIND_WEBSITE
          overall-tolerance: 2
          page-tolerance: 5
          factor-tolerance: 8
          require-meta: true
          fail-on-new-critical: true
          comment: false

      - name: Accessibility Summary
        run: |
          {
            echo "## ♿ Accessibility & SEO"
            echo "✔ HTML accessibility & landmarks"
            echo "✔ JSON-LD & metadata inspection"
            echo "✔ WCAG color contrast"
            echo "✔ AEO audit"
          } >> "$GITHUB_STEP_SUMMARY"

  ################################################################################
  # QUALITY • PERFORMANCE • LIGHTHOUSE (Runs in Parallel)
  ################################################################################

  quality-performance:
    name: 🚀 Quality • Performance • Lighthouse
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Validation Utilities
        run: npm install -g serve html-validate lighthouse @lhci/cli

      - name: Asset Integrity Audit
        run: |
          python3 <<'PYTHON'
          from pathlib import Path
          import re
          patterns = [r'src=["\']([^"\']+)["\']', r'href=["\']([^"\']+)["\']']

          # External URL patterns to skip (these are valid external resources)
          external_patterns = ['wa.me', 'maps.app.goo.gl', 'mindgracencr.in']

          for html in Path(".").rglob("*.html"):
              # Skip node_modules
              if 'node_modules' in str(html):
                  continue
              root = html.parent
              text = html.read_text(encoding="utf-8", errors="ignore")
              for pattern in patterns:
                  for ref in re.findall(pattern, text):
                      # Skip standard external URLs and special protocols
                      if ref.startswith(("http://", "https://", "mailto:", "tel:", "#", "data:")):
                          # Check if it's an external domain we should allow
                          if any(ext in ref for ext in external_patterns):
                              continue
                          continue
                      clean = ref.split("?")[0].split("#")[0]
                      target = (root / clean).resolve()
                      if not target.exists(): print(f"::warning file={html}::Missing asset -> {ref}")
          print("Asset audit completed.")
          PYTHON

      - name: Image Optimization Audit
        run: |
          python3 <<'PYTHON'
          from pathlib import Path
          large = []
          for image in Path(".").rglob("*"):
              # Skip node_modules
              if 'node_modules' in str(image):
                  continue
              if image.suffix.lower() not in {".png", ".jpg", ".jpeg", ".gif", ".webp", ".svg"}: continue
              size = image.stat().st_size
              if size > 1024 * 1024: large.append((image, size))
          for img, size in large: print(f"::notice file={img}::Large image ({round(size/1024/1024, 2)} MB)")
          print(f"Scanned {len(list(Path('.').rglob('*.*')))} assets.")
          PYTHON

      - name: Final HTML Validation
        run: html-validate "**/*.html"

      - name: Launch Local Web Server
        run: |
          python3 -m http.server 8080 &
          sleep 8

      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: http://localhost:8080/
          uploadArtifacts: true
          temporaryPublicStorage: false
          runs: 3

      - name: Convert Images to WebP
        continue-on-error: true
        uses: adnenre/img2webp@v1.0.0
        with:
          input-dir: .
          quality: 88
          update-refs: false
          keep-original: true

      - name: Publish HTML Reports
        continue-on-error: true
        uses: PavanMudigonda/html-reporter-github-pages@v1.5.21
        with:
          use_actions_summary: true
          keep_reports: 20
          force_orphan: true

      - name: Upload Lighthouse Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-results
          path: |
            .lighthouseci
            lighthouse-report
            lighthouse-results
          if-no-files-found: ignore

      - name: Performance Summary
        run: |
          {
            echo "## 🚀 Performance & Quality"
            echo "✔ Asset integrity & image audit"
            echo "✔ Lighthouse CI"
            echo "✔ HTML reports published"
          } >> "$GITHUB_STEP_SUMMARY"

  ################################################################################
  # PLAYWRIGHT (Runs in Parallel)
  ################################################################################

  playwright:
    name: 🌐 Cross-Browser Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci
          elif [ -f package.json ]; then npm install
          else echo "No package.json found."; fi

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Start Local Server
        run: |
          python3 -m http.server 8080 &
          sleep 8

      - name: Execute Playwright
        continue-on-error: true
        run: |
          if [ -f playwright.config.js ] || [ -f playwright.config.ts ]; then
            npx playwright test
          else
            echo "No Playwright configuration detected. Skipping tests."
          fi

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  ################################################################################
  # DEPLOY (Gated - Only runs if ALL parallel jobs succeed)
  ################################################################################

  deploy:
    name: 🚀 Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs:
      [
        pre-flight,
        ai-sanitizer,
        accessibility-seo,
        quality-performance,
        playwright,
      ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Verify Deployment Directory
        run: |
          if [[ ! -f index.html ]]; then
              echo "::error::index.html missing."
              exit 1
          fi
          echo "Deployment directory validated."

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Deployment Summary
        run: |
          {
            echo "# 🚀 Deployment Complete"
            echo "| Item | Value |"
            echo "|------|------|"
            echo "| Repository | $GITHUB_REPOSITORY |"
            echo "| Branch | $GITHUB_REF_NAME |"
            echo "| Commit | $GITHUB_SHA |"
            echo "| URL | ${{ steps.deployment.outputs.page_url }} |"
            echo "Completed: $(date -u)"
          } >> "$GITHUB_STEP_SUMMARY"

  ################################################################################
  # OPTIONAL REPOSITORY VISUALIZER
  ################################################################################

  repository-visualizer:
    name: 📁 Repository Diagram
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
      - name: Generate Repository Diagram
        uses: githubocto/repo-visualizer@0.9.1
        with:
          output_file: docs/repository-map.svg
          excluded_paths: >
            node_modules,
            .git,
            .github,
            playwright-report,
            lighthouse-results,
            test-results
          should_push: false

  ################################################################################
  # FINAL WORKFLOW SUMMARY
  ################################################################################

  workflow-summary:
    name: 📋 Workflow Summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      [
        pre-flight,
        ai-sanitizer,
        accessibility-seo,
        quality-performance,
        playwright,
        deploy,
      ]

    steps:
      - name: Generate Final Summary
        run: |
          {
            echo "# ✅ Ultra-Robust Static Site CI/CD Fortress"
            echo "## Pipeline Executed"
            echo "1. Repository validation"
            echo "2. AI sanitizer & static analysis"
            echo "3. HTML/CSS/JS/XML validation"
            echo "4. Hyperlink integrity & processing"
            echo "5. Accessibility & Schema.org"
            echo "6. WCAG color contrast & AEO audit"
            echo "7. Asset integrity & Lighthouse CI"
            echo "8. Playwright smoke tests"
            echo "9. GitHub Pages deployment"
            echo ""
            echo "Finished at: $(date -u)"
          } >> "$GITHUB_STEP_SUMMARY"
